# Pipeline Configuration File
# This file defines all available pipeline configurations and settings

# Project paths configuration
paths:
  # Path to models directory (relative to workspace root if not absolute)
  # models_path: "C:/Users/amd87/Desktop/GenAI-SD-v0224/models/"
  
  # Path to test scripts directory (relative to workspace root if not absolute)
  test_path: "./test"
  
  # Path to control images directory (for ControlNet pipelines)
  # Allows using relative paths in --control_image_path arguments
  control_images_path: "./test/assets"
  
  # Path to configuration files directory (for dynamic shape configs, etc.)
  # Allows using relative paths in --dynamic_shape_file_path arguments
  config_files_path: "./config"

# Default settings
defaults:
  width: 512
  height: 512
  # Streaming display settings
  streaming_output: true # Enable real-time output by default
  # Execution provider settings
  execution:
    force_cpu: false  # Set to true to force CPU-only execution (disables DML)
  # Custom operator library path (optional)
  # If not specified, runner_args.py will search in standard locations
  custom_op_path: "C:/Program Files/RyzenAI/1.7.1/deployment/onnx_custom_ops.dll"
  prompt: "An astronaut riding a green horse"
  # prompts:
    # medieval: "Photo of a bustling medieval marketplace, vibrant colors, detailed costumes, lively crowd, cinematic lighting, 8k resolution, masterpiece, art by Pieter Bruegel and John Howe"
    # anime: 'Anime style illustration of a girl wearing a suit. A moon in sky. In the background we see a big rain approaching. text "InstantX" on image'
  # prompt_file: "./config/artistic_prompts.json"


# Available pipeline configurations
pipelines:
# https://huggingface.co/amd/stable-diffusion-1.5-amdnpu
# amd/stable-diffusion-1.5-amdnpu
# Default prompt for 1.5 : Photo of a ultra realistic sailing ship, dramatic light, pale sunrise, cinematic lighting
  sd_15:
    name: "SD 1.5 Pipeline"
    script: "run_sd.py"
    model_ids:
      - "amd/stable-diffusion-1.5-amdnpu"
    extra_args:
      - "--num_inference_steps"
      - "20"

# https://huggingface.co/amd/sd-turbo-amdnpu
# amd/sd-turbo-amdnpu
# Default prompt: "A cinematic shot of a baby racoon wearing an intricate italian priest robe."
  sd_turbo:
    name: "SD Turbo Pipeline"
    script: "run_sd.py"
    # Execution provider settings (overrides defaults)
    model_ids:
      - "amd/sd-turbo-amdnpu"
    extra_args:
      - "--num_inference_steps"
      - "20"
      - "--guidance_scale"
      - "0.0"

  
# https://huggingface.co/amd/sdxl-base-amdnpu
# amd/sdxl-base-amdnpu
# Default prompt: "An astronaut riding a green horse"
  sdxl_base:
    name: "SDXL Base Pipeline"
    script: "run_sd_xl.py"
    width: 1024  # SDXL requires 1024x1024 for 128x128 latents
    height: 1024
    model_ids:
      - "amd/sdxl-base-amdnpu"
    extra_args:
      - "--num_inference_steps"
      - "50"

# https://huggingface.co/amd/sdxl-turbo-amdnpu
# amd/sdxl-turbo-amdnpu
# Default prompt: "A cinematic shot of a baby racoon wearing an intricate italian priest robe."
  sdxl_turbo:
    name: "SDXL Turbo Pipeline"
    script: "run_sd_xl.py"
    width: 512  # SDXL Turbo optimized for 512x512 for speed
    height: 512
    prompt: "A cat sitting on a fluffy cloud, reading a book, whimsical and dreamy atmosphere"
    model_ids:
      - "amd/sdxl-turbo-amdnpu"
    extra_args:
      - "--num_inference_steps"
      - "30"
      - "--guidance_scale"
      - "0.0"

# https://huggingface.co/amd/segmind-vega-amdnpu
# "amd/segmind-vega-amdnpu"
# Default prompt: "An astronaut riding a green horse"
  segmind_vega:
    name: "Segmind-Vega Pipeline"
    script: "run_sd_xl.py"
    width: 1024  
    height: 1024
    model_ids:
      - "amd/segmind-vega-amdnpu"
    extra_args:
      - "--num_inference_steps"
      - "50"


# https://huggingface.co/amd/stable-diffusion-3-medium-amdnpu
# "amd/stable-diffusion-3-medium-amdnpu"
### SD3
  sd3_base:
    name: "SD3 Pipeline"
    script: "run_sd3.py"
    model_ids:
      - "stabilityai/stable-diffusion-3-medium-amdnpu"
    extra_args:
      - "--num_inference_steps"
      - "28"
      - "--width"
      - "1024"
      - "--height"
      - "1024"
      - "--controlnet"
      - "None"
      - "--guidance_scale"
      - "5"
      - "--dynamic_shape"

  sd3_controlnet_canny:
    name: "SD3 ControlNet Canny Pipeline"
    script: "run_sd3.py"
    model_ids:
      - "amd/stable-diffusion-3-medium-amdnpu"
    extra_args:
      - "--num_inference_steps"
      - "8"
      - "--width"
      - "512"
      - "--height"
      - "512"
      - "--controlnet"
      - "Canny"
      - "--control_image_path"
      - "canny.jpg"
      - "--controlnet_conditioning_scale"
      - "0.2"
      - "--guidance_scale"
      - "4.5"

  sd3_controlnet_pose:
    name: "SD3 ControlNet Pose Pipeline"
    script: "run_sd3.py"
    model_ids:
      - "amd/stable-diffusion-3-medium-amdnpu"
    extra_args:
      - "--num_inference_steps"
      - "8"
      - "--width"
      - "1024"
      - "--height"
      - "1024"
      - "--controlnet"
      - "Pose"
      - "--control_image_path"
      - "pose.jpg"
      - "--controlnet_conditioning_scale"
      - "0.2"
      - "--guidance_scale"
      - "4.5"


  sd3_controlnet_tile:
    name: "SD3 ControlNet Tile Pipeline"
    script: "run_sd3.py"
    model_ids:
      - "amd/stable-diffusion-3-medium-amdnpu"
    extra_args:
      - "--num_inference_steps"
      - "8"
      - "--width"
      - "512"
      - "--height"
      - "512"
      - "--controlnet"
      - "Tile"
      - "--control_image_path"
      - "tile.jpg"
      - "--guidance_scale"
      - "4.5"
 
  sd3_base_dyn:
      name: "SD3 Dynamic Pipeline"
      script: "run_sd3.py"
      model_ids:
        - "amd/stable-diffusion-3-medium-amdnpu"
      extra_args:
        - "--num_inference_steps"
        - "8"
        - "--controlnet"
        - "None"
        - "--guidance_scale"
        - "4.5"
        - "--dynamic_shape"
        - "--dynamic_shape_file_path"
        - "sd3_dynamic_shape.json"

  sd3_controlnet_pose_dyn:
      name: "SD3 ControlNet Pose Dynamic Pipeline"
      script: "run_sd3.py"
      model_ids:
        - "amd/stable-diffusion-3-medium-amdnpu"
      extra_args:
        - "--num_inference_steps"
        - "8"
        - "--controlnet"
        - "Pose"
        - "--control_image_path"
        - "pose.jpg"
        - "--controlnet_conditioning_scale"
        - "0.2"
        - "--guidance_scale"
        - "4.5"
        - "--dynamic_shape"
        - "--dynamic_shape_file_path"
        - "sd3_dynamic_shape.json"

  sd3_controlnet_tile_dyn:
      name: "SD3 ControlNet Tile Dynamic Pipeline"
      script: "run_sd3.py"
      model_ids:
        - "amd/stable-diffusion-3-medium-amdnpu"
      extra_args:
        - "--num_inference_steps"
        - "8"
        - "--controlnet"
        - "Tile"
        - "--control_image_path"
        - "tile.jpg"
        - "--controlnet_conditioning_scale"
        - "0.2"
        - "--guidance_scale"
        - "4.5"
        - "--dynamic_shape"
        - "--dynamic_shape_file_path"
        - "sd3_dynamic_shape.json"

# https://huggingface.co/amd/stable-diffusion-3.5-medium-amdnpu
