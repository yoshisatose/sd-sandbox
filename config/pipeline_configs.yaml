# Default pipelines to run (if no --pipelines specified)
# You can specify which pipelines to run by their keys from the pipelines section above
default_run:
  - sd3_base
  - sd3_controlnet_canny
  - sd3_controlnet_pose
  - sd3_controlnet_tile

